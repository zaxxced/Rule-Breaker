<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isekai Verse Fiction - Beranda</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; text-align: center;
            /* PENGATURAN BACKGROUND CUSTOM */
            background-image: url('placeholder/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0d1b2a; /* Warna cadangan jika gambar gagal dimuat */
        }

        /* Overlay gelap agar teks tetap mudah dibaca di atas gambar */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Transparansi 60% */
            z-index: -1;
        }

        nav { background-color: rgba(26, 82, 118, 0.9); padding: 20px; font-size: 20px; font-weight: bold; letter-spacing: 2px;}
        
        .header-title { margin: 40px 0; position: relative; }
        .header-title h1 { font-size: 36px; margin-bottom: 5px; color: #5dade2; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .header-title p { color: #d5dbdb; font-size: 18px; }

        .character-grid {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; max-width: 1100px; margin: auto;
            position: relative;
        }

        .char-card {
            background-color: rgba(27, 38, 49, 0.85); /* Sedikit transparan agar estetik */
            border: 2px solid #2e86c1;
            border-radius: 10px;
            width: 180px;
            padding: 15px;
            text-decoration: none; 
            color: white;
            transition: 0.3s;
            backdrop-filter: blur(5px); /* Efek blur pada kartu */
        }

        .char-card:hover {
            background-color: #2e86c1;
            transform: translateY(-5px); 
        }

        .char-card img { width: 100%; border-radius: 5px; margin-bottom: 10px; filter: grayscale(50%); }
        .char-card:hover img { filter: grayscale(0%); }
        .char-card h3 { margin: 0 0 5px 0; font-size: 18px; }
        .char-card p { margin: 0; font-size: 13px; color: #bdc3c7; }
    </style>
</head>
<body>

    <nav>ISEKAI VERSE FICTION</nav>

    <div class="header-title">
        <h1>ISEKAI VERSE CHARACTER'S</h1>
        <p>Pilih karakter untuk dilihat!</p>
    </div>

    <div class="character-grid" id="charGrid">
        
        <a
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=Theo" alt="Theo">
            <h3>Theo</h3>
            <p>Cleric</p>
        </a>

        <a href="#" class="char-card">
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=Tristan" alt="Tristan">
            <h3>Tristan</h3>
            <p>Berserker</p>
        </a>

        <a href="#" class="char-card">
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=Ulric" alt="Ulric">
            <h3>Ulric</h3>
            <p>Warlord</p>
        </a>

        <a href="#" class="char-card">
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=Uriel" alt="Uriel">
            <h3>Uriel</h3>
            <p>Oracle</p>
        </a>

        <a href="#" class="char-card">
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=Vaan" alt="Vaan">
            <h3>Vaan</h3>
            <p>Thief</p>
        </a>

        <a href="#" class="char-card">
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=Vesper" alt="Vesper">
            <h3>Vesper</h3>
            <p>Night Watcher</p>
        </a>

        <a href="#" class="char-card">
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=William" alt="William">
            <h3>William</h3>
            <p>Royal Guard</p>
        </a>

        <a href="#" class="char-card">
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=Xander" alt="Xander">
            <h3>Xander</h3>
            <p>Gladiator</p>
        </a>

        <a href="#" class="char-card">
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=Xion" alt="Xion">
            <h3>Xion</h3>
            <p>Time Weaver</p>
        </a>

        <a href="#" class="char-card">
            <img src="https://via.placeholder.com/200x200/1a4261/ffffff?text=Yelan" alt="Yelan">
            <h3>Yelan</h3>
            <p>Intelligence Agent</p>
        </a>

        <!-- Format Zuya sedikit diubah agar sejajar dengan yang lain (menggunakan tag <h3>) -->
        <a href="Zuya.html" class="char-card">
            <img src="placeholder/zuya_icon.png" alt="Zuya">
            <h3>Zuya</h3>
            <p>From Rule Breaker</p>
        </a>

    </div>

    <!-- SCRIPT PENGURUTAN OTOMATIS -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Mengambil elemen grid dan semua kartu di dalamnya
            const grid = document.getElementById('charGrid');
            const cards = Array.from(grid.querySelectorAll('.char-card'));

            // Proses mengurutkan kartu berdasarkan teks di dalam tag <h3>
            cards.sort((a, b) => {
                const nameA = a.querySelector('h3').innerText.toUpperCase();
                const nameB = b.querySelector('h3').innerText.toUpperCase();
                return nameA.localeCompare(nameB);
            });

            // Menghapus kartu lama dan memasukkan kartu yang sudah berurutan
            grid.innerHTML = '';
            cards.forEach(card => grid.appendChild(card));
        });
    </script>

</body>
</html>
