<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Information</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Mencegah scroll */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        /* --- BACKGROUND DENGAN BLUR --- */
        .bg-image {
            position: fixed;
            top: -5px; /* Sedikit offset untuk menutupi pinggiran blur */
            left: -5px;
            width: calc(100% + 10px);
            height: calc(100% + 10px);
            /* Menggunakan gambar rbbg.icon Anda */
            background-image: url('placeholder/rbbg.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Efek blur sedikit (3px) */
            filter: blur(3px); 
            z-index: -2; /* Paling belakang */
        }

        /* --- OVERLAY HITAM OPACITY 20% --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Warna hitam dengan opacity 0.2 (20%) */
            background-color: rgba(0, 0, 0, 0.2); 
            z-index: -1; /* Di depan gambar, di belakang teks */
        }

        /* --- KONTEN TENGAH --- */
        .content-container {
            padding: 20px;
            z-index: 1; /* Di depan overlay */
        }

        /* --- TEXT UTAMA: TEBAL, BESAR, PUTIH, GLOW --- */
        .main-text {
            font-size: 32px; /* Agak besar */
            font-weight: bold; /* Tebal */
            color: white;
            text-transform: uppercase; /* Membuat kapital semua (opsional, sesuai request) */
            margin-bottom: 15px; /* Jarak ke teks bawah */
            /* Efek glow putih sedikit (bayangan lembut) */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7); 
            letter-spacing: 1px; /* Jarak antar huruf agar enak dibaca */
        }

        /* --- TEXT BAWAH: KECIL, ABU TERANG, LINK --- */
        .back-link {
            font-size: 16px; /* Kecil */
            color: #d1d1d1; /* Abu-abu terang */
            text-decoration: none; /* Menghapus garis bawah */
            transition: 0.3s; /* Efek transisi halus saat hover */
            cursor: pointer;
            display: inline-block; /* Agar padding/margin bekerja dengan baik */
            padding: 5px 10px;
        }

        /* Efek saat mouse diarahkan (hover) ke link */
        .back-link:hover {
            color: white; /* Menjadi putih terang */
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); /* Glow tipis */
        }

        /* Responsif untuk layar HP kecil */
        @media (max-width: 600px) {
            .main-text {
                font-size: 24px;
            }
            .back-link {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Elemen Background -->
    <div class="bg-image"></div>
    
    <!-- Elemen Overlay Hitam 20% -->
    <div class="overlay"></div>

    <!-- Wadah Konten di Tengah -->
    <div class="content-container">
        <h1 class="main-text">THERE'S NO INFORMATION ABOUT THIS CHARACTER YET</h1>
        <!-- Link kembali ke index.html -->
        <a href="index.html" class="back-link">Click to comeback</a>
    </div>

</body>
</html>
